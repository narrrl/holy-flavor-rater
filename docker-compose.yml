version: '3.8'

services:
  # --- Backend Service (Gunicorn + WhiteNoise) ---
  backend:
    build:
      context: ./backend
    container_name: holy-backend
    restart: unless-stopped
    networks:
      - narl
      - internal
    env_file:
      - .env.narl.io
    volumes:
      - ./backend:/app
      - ./legacy:/app/legacy
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=narl"
      - "traefik.http.routers.holy-energy-backend.priority=100"
      - "traefik.http.routers.holy-energy-backend.rule=Host(`holy.narl.io`) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/static`) || PathPrefix(`/media`))"
      - "traefik.http.routers.holy-energy-backend.entrypoints=websecure"
      - "traefik.http.routers.holy-energy-backend.tls.certresolver=https_resolver"
      - "traefik.http.services.holy-energy-backend.loadbalancer.server.port=8000"

  # --- Frontend Service (Nginx serving built React app) ---
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=https://holy.narl.io/api/
    container_name: holy-frontend
    restart: unless-stopped
    networks:
      - narl
    env_file:
      - .env.narl.io
    depends_on:
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=narl"
      # Higher priority for backend paths is set on the backend router, 
      # but we use an explicit exclusion here to be 100% safe.
      - "traefik.http.routers.holy-energy-frontend.priority=10"
      - "traefik.http.routers.holy-energy-frontend.rule=Host(`holy.narl.io`) && !(PathPrefix(`/api`) || PathPrefix(`/admin`) || PathPrefix(`/static`) || PathPrefix(`/media`))"
      - "traefik.http.routers.holy-energy-frontend.entrypoints=websecure"
      - "traefik.http.routers.holy-energy-frontend.tls.certresolver=https_resolver"
      - "traefik.http.services.holy-energy-frontend.loadbalancer.server.port=80"

networks:
  narl:
    external: true
  internal:
    internal: true

volumes:
  db_data:
