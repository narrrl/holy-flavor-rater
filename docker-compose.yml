version: '3.8'

services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
      - ./legacy:/app/legacy
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    env_file:
      - ./.env
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents host node_modules from overwriting container
    depends_on:
      - backend

volumes:
  db_data: # Persist the database
