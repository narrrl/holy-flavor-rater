components:
  schemas:
    Banner:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        description:
          type: string
        is_active:
          type: boolean
          description: Designates this as the global default banner.
        is_enabled:
          type: boolean
          description: Allows users to select this banner.
        settings: {}
        schema: {}
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - slug
      - updated_at
    Category:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 50
        slug:
          type: string
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
      required:
      - id
      - name
      - slug
    Flavor:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
          maxLength: 100
        category:
          type: integer
        category_name:
          type: string
          readOnly: true
        category_slug:
          type: string
          readOnly: true
        description:
          type: string
        average_rating:
          type: number
          format: double
          readOnly: true
        followed_average_rating:
          type: number
          format: double
          readOnly: true
        user_rating:
          type: integer
          nullable: true
          readOnly: true
        ratings:
          type: array
          items:
            $ref: '#/components/schemas/Rating'
          readOnly: true
        image_url:
          type: string
          nullable: true
          readOnly: true
        image_urls:
          type: array
          items:
            type: string
          readOnly: true
        image:
          type: string
          format: uri
          writeOnly: true
          nullable: true
        is_available:
          type: boolean
        is_legacy:
          type: boolean
        shop_url:
